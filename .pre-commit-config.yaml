repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: line-budget
        name: 1000-line file budget
        entry: python scripts/check_file_line_budget.py
        language: python
        pass_filenames: false
        always_run: true

      - id: no-raw-sqlite
        name: no raw sqlite3.connect()
        entry: bash -c 'grep -rn "sqlite3\.connect(" server/ core/ agents/ scripts/ && exit 1 || exit 0'
        language: system
        pass_filenames: false

      - id: no-llm-content-attr
        name: no LLMResponse.content (use .text)
        entry: bash -c 'grep -rn "raw\.content\b\|response\.content\b" core/ agents/ && exit 1 || exit 0'
        language: system
        pass_filenames: false

      - id: no-floats-in-payments
        name: no float() in payment paths
        entry: bash -c 'grep -rn "float(" core/payments/ && exit 1 || exit 0'
        language: system
        pass_filenames: false
