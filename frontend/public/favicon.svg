<svg xmlns="http://www.w3.org/2000/svg" viewBox="-32 -32 64 64" width="64" height="64">
  <style>
    .stroke { stroke: #063F43; fill: none; stroke-linejoin: round; }
    .dot    { fill: #C65F3F; }
    @media (prefers-color-scheme: dark) {
      .stroke { stroke: #7EB9B0; }
      .dot    { fill: #E07A57; }
    }
  </style>
  <g>
    <rect class="stroke" x="-22" y="-22" width="44" height="44" stroke-width="3.2" />
    <rect class="stroke" x="-22" y="-22" width="44" height="44" stroke-width="3.2" transform="rotate(45)" />
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite" />
  </g>
  <circle class="dot" cx="0" cy="0" r="4.5" />
</svg>
